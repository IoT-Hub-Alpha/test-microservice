on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches:
      - "main"
      - "develop"
      - "feature/**"
      - "task-**"

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (black)
        run: |
          if [ -d "app" ]; then
            black --check app
          fi
          if [ -d "tests" ]; then
            black --check tests
          fi

      - name: Lint (flake8)
        run: |
          if [ -d "app" ]; then
            flake8 app
          fi
          if [ -d "tests" ]; then
            flake8 tests
          fi

  tests:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests with coverage gate
        run: |
          if [ -d "tests" ]; then
            pytest -q --maxfail=1 \
              --cov=app \
              --cov-report=xml:coverage.xml \
              --cov-report=html:htmlcov
          else
            echo "No tests directory found, skipping tests"
          fi